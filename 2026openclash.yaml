#====核心配置 =======
mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090

profile:
  store-selected: true
  store-fake-ip: true

#====DNS防泄漏====
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.tencent.com/dns-query
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

#====TUN推荐====
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

#====机场订阅========
proxy-providers:
  airport:
    type: http
    url: "你的订阅地址"
    interval: 3600
    path: ./proxy_provider/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

#====节点地区分组====
proxy-groups:
  - name: 🇭🇰 香港节点
    type: select
    use:
      - airport
    filter: "(?i)hk|hongkong|香港"

  - name: 🇸🇬 新加坡节点
    type: select
    use:
      - airport
    filter: "(?i)sg|singapore|新加坡"

  - name: 🇯🇵 日本节点
    type: select
    use:
      - airport
    filter: "(?i)jp|japan|日本"

  - name: 🇺🇸 美国节点
    type: select
    use:
      - airport
    filter: "(?i)us|america|美国"

  #====自动测速节点====
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    use:
      - airport
    url: http://www.gstatic.com/generate_204
    interval: 300

  #====AI优选节点====
  - name: 🤖 AI优选
    type: url-test
    use:
      - airport
    filter: "(?i)us|sg"
    url: http://www.gstatic.com/generate_204
    interval: 300

  #====AI服务策略====
  - name: 🧠 ChatGPT
    type: select
    proxies:
      - 🤖 AI优选
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点

  - name: ✨ Gemini
    type: select
    proxies:
      - 🤖 AI优选
      - 🇯🇵 日本节点

  - name: 🧩 Claude
    type: select
    proxies:
      - 🤖 AI优选

  - name: 🚀 Grok
    type: select
    proxies:
      - 🤖 AI优选

  - name: 🤖 Copilot
    type: select
    proxies:
      - 🤖 AI优选

  #====X(Twitter)====
  - name: 🐦 X自动
    type: url-test
    use:
      - airport
    filter: "(?i)us|jp|sg"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🐦 X(Twitter)
    type: select
    proxies:
      - 🐦 X自动
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点

  #====流媒体====
  - name: 📹 YouTube
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - ♻️ 自动选择

  - name: 🎬 Netflix
    type: select
    proxies:
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点

  - name: 📺 Disney+
    type: select
    proxies:
      - 🇸🇬 新加坡节点

  - name: 🎞 PrimeVideo
    type: select
    proxies:
      - 🇺🇸 美国节点

  - name: 📱 TikTok
    type: select
    proxies:
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点

  #====基础服务====
  - name: 🌍 Google
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点

  - name: 📦 Telegram
    type: select
    proxies:
      - 🇺🇸 美国节点

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT

  - name: 💻 GitHub
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇯🇵 日本节点
      - 🚀 节点选择

  #==== 游戏平台====
  - name: 🎮 Steam
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择

  #====广告拦截====
  - name: 🚫 广告拦截
    type: select
    proxies:
      - REJECT

  #====默认策略====
  - name: 🇨🇳 国内网站
    type: select
    proxies:
      - DIRECT

  - name: 🌐 国外网站
    type: select
    proxies:
      - ♻️ 自动选择

