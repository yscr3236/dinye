- DOMAIN-SUFFIX,googleapis.com,✨ Gemini优选
- DOMAIN-SUFFIX,play.googleapis.com,🇺🇸 美国
- DOMAIN-SUFFIX,android.clients.google.com,🇺🇸 美国
- DOMAIN-SUFFIX,services.googleapis.com,🇺🇸 美国
- DOMAIN-SUFFIX,services.googleapis.cn,DIRECT
# GrokAI
- DOMAIN-SUFFIX,grok.x.ai,🚀 Grok优选
- DOMAIN-SUFFIX,api.x.ai,🚀 Grok优选
# ChatGPT
