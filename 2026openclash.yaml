mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
secret: openclash

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - "*.localdomain"
  - "*.msftconnecttest.com"
  - "*.msftncsi.com"

  fallback-filter:
  geoip: true
  geoip-code: CN
  ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
  
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

sniffer:
  enable: true
  sniffing:
    - tls
    - http
  override-destination: true
  force-domain:
    - +.youtube.com
    - +.x.com
    - +.twitter.com
  skip-domain:
    - +.apple.com

proxy-providers:
  airport:
    type: http
    url: "机场订阅"
    interval: 3600
    path: ./proxy_provider/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxies: []

proxy-groups:

# 核心节点
- name: 🚀 节点选择
  type: select
  proxies:
    - ♻️ 自动选择
    - 🌍 全球优选
    - 🇭🇰 香港
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇹🇼 台湾
    - 🇺🇸 美国
    - DIRECT

# 全球自动测速
- name: ♻️ 自动选择
  type: url-test
  use:
    - airport
  url: http://cp.cloudflare.com/generate_204
  interval: 300

# 全球优选
- name: 🌍 全球优选
  type: url-test
  use:
    - airport
  url: http://cp.cloudflare.com/generate_204
  interval: 180

# 地区分组
- name: 🇭🇰 香港
  type: select
  use:
    - airport
  filter: "(?i)hk|hongkong|香港"
 
- name: 🇹🇼 台湾
  type: select
  use:
    - airport
  filter: "(?i)tw|taiwan|台湾"

- name: 🇯🇵 日本
  type: select
  use:
    - airport
  filter: "(?i)jp|japan|日本"

- name: 🇸🇬 新加坡
  type: select
  use:
    - airport
  filter: "(?i)sg|singapore|新加坡"

- name: 🇺🇸 美国
  type: select
  use:
    - airport
  filter: "(?i)us|america|unitedstates|美国"

# AI 节点池（只筛美国/新加坡/日本）
- name: 🚀 AI节点池
  type: url-test
  use:
    - airport
  filter: "(?i)(us|america|unitedstates|美国|新加坡|sg|singapore|日本|jp|japan)"
  exclude-filter: "(?i)(直连|direct|香港|hk|台湾|tw|马来|my|越南|vn|印度|in|韩国|kr|泰国|th|英国|uk|法国|fr)"
  url: http://cp.cloudflare.com/generate_204
  interval: 300
  lazy: true

# AI 优选
- name: 🚀 AI优选
  type: select
  proxies:
    - 🚀 AI节点池
    - 🇺🇸 美国
    - 🇸🇬 新加坡
    - 🇯🇵 日本

# Gemini 节点池（只筛美国）
- name: ✨ Gemini节点池
  type: url-test
  use:
    - airport
  filter: "(?i)(us|america|unitedstates|美国|洛杉矶|西雅图|纽约|芝加哥)"
  exclude-filter: "(?i)(直连|direct|香港|hk|台湾|tw|新加坡|sg|日本|jp)"
  url: https://gemini.google.com
  interval: 300
  lazy: true

# Gemini 优选（只允许美国）
- name: ✨ Gemini优选
  type: select
  proxies:
    - ✨ Gemini节点池
    - 🇺🇸 美国

# ChatGPT
- name: 🧠 ChatGPT优选
  type: select
  proxies:
    - 🚀 AI节点池
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🇯🇵 日本

# Claude
- name: 🧩 Claude优选
  type: select
  proxies:
    - 🚀 AI节点池
    - 🇺🇸 美国
    - 🇯🇵 日本

# Copilot
- name: 🤖 Copilot优选
  type: select
  proxies:
    - 🚀 AI节点池
    - 🇺🇸 美国
    - 🇯🇵 日本

# GrokAI
- name: 🚀 Grok优选
  type: select
  proxies:
    - 🚀 AI节点池
    - 🇺🇸 美国

# 社交
- name: 🐦 Twitter优选
  type: url-test
  use:
    - airport
  filter: "(?i)us|jp|sg|hk|america|japan|singapore|hongkong|美国|日本|新加坡|香港"
  url: http://cp.cloudflare.com/generate_204
  interval: 300

- name: 🐦 Twitter
  type: select
  proxies:
    - 🐦 Twitter优选
    - 🇺🇸 美国
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇭🇰 香港
    - 🌍 全球优选

# 流媒体自动优选
- name: 📹 YouTube优选
  type: url-test
  use:
    - airport
  filter: '香港|台湾|日本|新加坡|HK|TW|JP|SG'
  url: http://cp.cloudflare.com/generate_204
  interval: 180

- name: 📹 YouTube
  type: select
  proxies:
    - 📹 YouTube优选
    - 🇭🇰 香港
    - 🇯🇵 日本
    - 🇸🇬 新加坡

- name: 🎬 Netflix优选
  type: url-test
  use:
    - airport
  filter: "(?i)sg|us|jp|新加坡|美国|日本"
  url: https://www.netflix.com/title/70143836
  interval: 300

- name: 🎬 Netflix
  type: select
  proxies:
    - 🎬 Netflix优选
    - 🇸🇬 新加坡
    - 🇺🇸 美国

- name: 📱 TikTok优选
  type: url-test
  use:
    - airport
  filter: "(?i)sg|us|jp|新加坡|美国|日本"
  url: http://cp.cloudflare.com/generate_204
  interval: 300

- name: 📱 TikTok
  type: select
  proxies:
    - 📱 TikTok优选
    - 🇯🇵 日本
    - 🇸🇬 新加坡

- name: 📺 Disney优选
  type: url-test
  use:
    - airport
  filter: "(?i)sg|us|jp|新加坡|美国|日本"
  url: https://www.disneyplus.com
  interval: 300

- name: 📺 Disney+
  type: select
  proxies:
    - 📺 Disney优选
    - 🇸🇬 新加坡
    - 🇺🇸 美国

- name: 🎞 PrimeVideo
  type: select
  proxies:
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🌍 全球优选

# 服务
- name: 🌍 Google
  type: fallback
  use:
      - airport
  url: http://cp.cloudflare.com/generate_204
  filter: "(?i)🇺🇸|🇯🇵|Google|Gemini"
  interval: 300
 
- name: 📦 Telegram
  type: select
  proxies:
    - 🇺🇸 美国
    - 🌍 全球优选

- name: 🍎 Apple
  type: select
  proxies:
    - DIRECT
    - 🚀 节点选择
  ...
  - name: 💻 GitHub优选
    type: url-test
    use:
      - airport
    filter: "(?i)github|githubusercontent|github.io"
    url: https://github.com
    interval: 180
    lazy: true

  # 原 GitHub 策略组修改
  - name: 💻 GitHub
    type: select
    proxies:
      - 💻 GitHub优选
      - 🇭🇰 香港
      - 🇺🇸 美国

# 游戏
- name: 🎮 Steam
  type: select
  proxies:
    - 🌍 全球优选

# 广告
- name: 🚫 广告拦截
  type: select
  proxies:
    - REJECT

# 国内
- name: 🇨🇳 国内网站
  type: select
  proxies:
    - DIRECT

# 国外
- name: 🌐 国外网站
  type: select
  proxies:
    - 🚀 节点选择

